<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Skritt Tracker">
    <meta name="description" content="Spor dine daglige skritt mot ukentlige mål">
    <title>Skritt Tracker</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%2310b981' width='180' height='180'/><text x='90' y='110' font-size='100' font-weight='bold' fill='white' text-anchor='middle' font-family='system-ui'>👟</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%2310b981' width='180' height='180'/><text x='90' y='110' font-size='100' font-weight='bold' fill='white' text-anchor='middle' font-family='system-ui'>👟</text></svg>">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Skritt%20Tracker%22,%22short_name%22:%22Skritt%22,%22description%22:%22Spor%20dine%20skritt%20mot%20ukentlige%20mål%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%2310b981%22,%22orientation%22:%22portrait-primary%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%2310b981' width='192' height='192'/><text x='96' y='130' font-size='120' font-weight='bold' fill='white' text-anchor='middle' font-family='system-ui'>👟</text></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%22}]}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f4f8 100%);
            color: #1f2937;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            height: max(env(safe-area-inset-top), 12px);
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .safe-area-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            max-width: 100%;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 28px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
            animation: headerSlideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes headerSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-icon {
            font-size: 44px;
            margin-bottom: 12px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.8px;
        }

        .main-content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            animation: cardSlideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 13px;
            color: #6b7280;
            font-weight: 600;
        }

        input[type="number"],
        input[type="date"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            background: white;
            color: #1f2937;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        }

        input[type="number"]:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: #10b981;
            background: #f0fdf4;
            box-shadow: 0 0 0 8px rgba(16, 185, 129, 0.1);
            transform: scale(1.02);
        }

        input[type="number"]::placeholder {
            color: #d1d5db;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            border-radius: 14px;
            padding: 14px;
            border: 1px solid #d1fae5;
        }

        .stat-label {
            font-size: 12px;
            color: #059669;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #10b981;
            font-variant-numeric: tabular-nums;
            animation: numberPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes numberPop {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-label {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-percentage {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 14px;
        }

        .progress-bar-container {
            position: relative;
            width: 100%;
            height: 12px;
            background: #e5e7eb;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            border-radius: 6px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .completion-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #065f46;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            margin-top: 16px;
            animation: badgePulse 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid #6ee7b7;
        }

        @keyframes badgePulse {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            -webkit-user-select: none;
            user-select: none;
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 4px 8px rgba(16, 185, 129, 0.2);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            color: #374151;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .btn-secondary:active {
            background: #e5e7eb;
            transform: scale(0.96);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fecaca 0%, #fca5a5 100%);
            color: #7f1d1d;
            box-shadow: 0 4px 8px rgba(252, 165, 165, 0.3);
        }

        .btn-danger:active {
            transform: scale(0.96);
        }

        .btn-small {
            padding: 12px 16px;
            font-size: 13px;
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #9ca3af;
            font-size: 15px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.6;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .daily-log {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .daily-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f3f4f6;
            animation: slideInLeft 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .daily-entry:last-child {
            border-bottom: none;
        }

        .daily-entry-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .daily-entry-date {
            font-size: 12px;
            color: #9ca3af;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .daily-entry-steps {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            font-variant-numeric: tabular-nums;
        }

        .daily-entry-remove {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border: none;
            border-radius: 10px;
            color: #dc2626;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }

        .daily-entry-remove:active {
            background: #fecaca;
            transform: scale(0.9);
        }

        .setup-section {
            display: flex;
            flex-direction: column;
        }

        .setup-section.hidden {
            display: none;
        }

        .tracking-section {
            display: flex;
            flex-direction: column;
        }

        .tracking-section.hidden {
            display: none;
        }

        .section-spacer {
            height: 4px;
        }

        .app-content::-webkit-scrollbar {
            width: 4px;
        }

        .app-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .app-content::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, 0.3);
            border-radius: 2px;
        }

        .app-content::-webkit-scrollbar-thumb:hover {
            background: rgba(16, 185, 129, 0.5);
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #10b981;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-height: 640px) {
            header {
                padding: 20px 20px;
            }

            header h1 {
                font-size: 24px;
            }

            .header-icon {
                font-size: 36px;
            }

            .main-content {
                gap: 10px;
                padding: 12px;
            }

            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="status-bar"></div>
    
    <div class="safe-area-container">
        <header>
            <span class="header-icon">👟</span>
            <h1>Skritt Tracker</h1>
        </header>

        <div class="app-content">
            <div class="container">
                <div class="main-content">
                    <!-- Setup Section -->
                    <div class="setup-section">
                        <div class="card">
                            <div class="card-title">Ukentlig mål</div>
                            <div class="input-group">
                                <input type="number" id="weekly-goal" placeholder="Eksempel: 70000" inputmode="numeric">
                                <button class="btn-primary" onclick="setGoal()">Start tracking</button>
                            </div>
                        </div>
                    </div>

                    <!-- Tracking Section -->
                    <div class="tracking-section hidden">
                        <!-- Progress Card -->
                        <div class="card">
                            <div class="card-title">Denne uken</div>
                            <div class="stat-grid">
                                <div class="stat-card">
                                    <div class="stat-label">Mål</div>
                                    <div class="stat-value" id="goal-display">0</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-label">Igjen</div>
                                    <div class="stat-value" id="steps-remaining">0</div>
                                </div>
                            </div>
                            
                            <div class="progress-section">
                                <div class="progress-label">
                                    <span>Fremgang</span>
                                    <span class="progress-percentage" id="progress-percentage">0%</span>
                                </div>
                                <div class="progress-bar-container">
                                    <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
                                </div>
                            </div>

                            <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #f3f4f6; margin-top: 12px;">
                                <div>
                                    <div style="font-size: 12px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px;">Registrert</div>
                                    <div class="stat-value" id="steps-done">0</div>
                                </div>
                                <div id="completion-message" style="display: none;">
                                    <div class="completion-badge">
                                        <span>✨</span>
                                        <span>Mål nådd!</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="section-spacer"></div>

                        <!-- Add Steps Card -->
                        <div class="card">
                            <div class="card-title">Legg til skritt</div>
                            <div class="input-group">
                                <label for="steps-date">Hvilken dag?</label>
                                <input type="date" id="steps-date">
                                <input type="number" id="daily-steps" placeholder="Hvor mange skritt?" inputmode="numeric">
                                <button class="btn-primary" onclick="addDailySteps()">Legg til</button>
                            </div>
                        </div>

                        <div class="section-spacer"></div>

                        <!-- History Card -->
                        <div class="card">
                            <div class="card-title">Din uke</div>
                            <div id="daily-log"></div>
                        </div>

                        <div class="section-spacer"></div>

                        <!-- Action Buttons -->
                        <div class="button-group" style="flex-direction: row;">
                            <button class="btn-secondary btn-small" onclick="changeGoal()">Endre mål</button>
                            <button class="btn-danger btn-small" onclick="resetWeekConfirm()">Tilbakestill</button>
                        </div>

                        <div style="height: 24px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
const CACHE_NAME = 'skritt-tracker-v1';
const urlsToCache = ['/'];

self.addEventListener('install', event => {
    event.waitUntil(caches.open(CACHE_NAME));
});

self.addEventListener('fetch', event => {
    event.respondWith(
        caches.match(event.request).then(response => {
            return response || fetch(event.request).catch(() => {
                return caches.match('/');
            });
        })
    );
});
`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }

        const STORAGE_KEY = 'skritt_tracker_data';

        function getTodayDateString() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function loadData() {
            try {
                const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                return {
                    weeklyGoal: data.weeklyGoal || null,
                    entries: data.entries || [],
                    weekStart: data.weekStart || null
                };
            } catch (e) {
                return { weeklyGoal: null, entries: [], weekStart: null };
            }
        }

        function saveData(data) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.error('Kunne ikke lagre data:', e);
            }
        }

        function createConfetti() {
            const colors = ['#10b981', '#059669', '#6ee7b7', '#a7f3d0'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (2 + Math.random() * 1) + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        function setGoal() {
            const goalInput = document.getElementById('weekly-goal');
            const goal = parseInt(goalInput.value);

            if (!goal || goal <= 0) {
                alert('Vennligst skriv inn et gyldig mål (større enn 0)');
                return;
            }

            const now = new Date();
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            weekStart.setHours(0, 0, 0, 0);

            saveData({
                weeklyGoal: goal,
                entries: [],
                weekStart: weekStart.toISOString()
            });

            goalInput.value = '';
            showTrackingSection();
            updateDisplay();
        }

        function changeGoal() {
            const data = loadData();
            document.getElementById('weekly-goal').value = data.weeklyGoal;
            document.querySelector('.setup-section').classList.remove('hidden');
            document.querySelector('.tracking-section').classList.add('hidden');
            document.getElementById('weekly-goal').focus();
        }

        function addDailySteps() {
            const stepsInput = document.getElementById('daily-steps');
            const dateInput = document.getElementById('steps-date');
            const steps = parseInt(stepsInput.value);

            if (!steps || steps < 0) {
                alert('Vennligst skriv inn et gyldig antall skritt');
                return;
            }

            if (!dateInput.value) {
                alert('Vennligst velg en dag');
                return;
            }

            const data = loadData();
            const selectedDate = new Date(dateInput.value);
            selectedDate.setHours(0, 0, 0, 0);

            const existingIndex = data.entries.findIndex(e => new Date(e.date).toDateString() === selectedDate.toDateString());

            if (existingIndex >= 0) {
                data.entries[existingIndex].steps = steps;
            } else {
                data.entries.push({
                    date: selectedDate.toISOString(),
                    steps: steps
                });
            }

            saveData(data);
            stepsInput.value = '';
            dateInput.value = getTodayDateString();
            stepsInput.focus();
            updateDisplay();
        }

        function removeDailyEntry(date) {
            const data = loadData();
            data.entries = data.entries.filter(e => e.date !== date);
            saveData(data);
            updateDisplay();
        }

        function resetWeekConfirm() {
            if (confirm('Vil du slette all data for denne uken? Dette kan ikke angres.')) {
                const data = loadData();
                data.entries = [];
                saveData(data);
                updateDisplay();
            }
        }

        function showTrackingSection() {
            document.querySelector('.setup-section').classList.add('hidden');
            document.querySelector('.tracking-section').classList.remove('hidden');
        }

        function updateDisplay() {
            const data = loadData();

            if (!data.weeklyGoal) {
                document.querySelector('.setup-section').classList.remove('hidden');
                document.querySelector('.tracking-section').classList.add('hidden');
                return;
            }

            showTrackingSection();

            const totalSteps = data.entries.reduce((sum, e) => sum + e.steps, 0);
            const remaining = Math.max(0, data.weeklyGoal - totalSteps);
            const progress = Math.min(100, (totalSteps / data.weeklyGoal) * 100);

            document.getElementById('goal-display').textContent = data.weeklyGoal.toLocaleString('no-NO');
            document.getElementById('steps-done').textContent = totalSteps.toLocaleString('no-NO');
            document.getElementById('steps-remaining').textContent = remaining.toLocaleString('no-NO');

            const progressBar = document.getElementById('progress-bar');
            const progressPercentage = document.getElementById('progress-percentage');
            progressBar.style.width = progress + '%';
            progressPercentage.textContent = Math.round(progress) + '%';

            const completionMsg = document.getElementById('completion-message');
            if (remaining === 0 && totalSteps > 0) {
                completionMsg.style.display = 'block';
                createConfetti();
            } else {
                completionMsg.style.display = 'none';
            }

            const log = document.getElementById('daily-log');
            if (data.entries.length === 0) {
                log.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div>Ingen registreringer ennå. Legg til dine skritt!</div></div>';
            } else {
                log.innerHTML = '<div class="daily-log">' + data.entries
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .map(entry => {
                        const date = new Date(entry.date);
                        const dayName = date.toLocaleDateString('no-NO', { weekday: 'short', day: 'numeric', month: 'short' });
                        return `
                            <div class="daily-entry">
                                <div class="daily-entry-info">
                                    <div class="daily-entry-date">${dayName}</div>
                                    <div class="daily-entry-steps">${entry.steps.toLocaleString('no-NO')} skritt</div>
                                </div>
                                <button class="daily-entry-remove" onclick="removeDailyEntry('${entry.date}')" title="Fjern">×</button>
                            </div>
                        `;
                    }).join('') + '</div>';
            }
        }

        // Prevent zooming on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Prevent pinch zoom
        document.addEventListener('touchmove', (event) => {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('steps-date').value = getTodayDateString();
            updateDisplay();
        });
    </script>
</body>
</html>
